<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Blog</title>

<script>
function isWeChat() {
    return /MicroMessenger/i.test(navigator.userAgent);
}

window.onload = function() {

    if (isWeChat()) {
        alert("检测到微信内置浏览器，请点击右上角 → 在浏览器打开");
    } else {
        window.location.replace("https://你的博客.pages.dev");
    }

}
</script>

</head>

<body>

<h2>进入博客</h2>
<p>如果没有自动跳转，请点击下面链接</p>

<a href="https://你的博客.pages.dev">进入博客</a>

</body>
</html>
