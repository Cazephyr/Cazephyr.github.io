<script>
function isWeChat() {
    return /MicroMessenger/i.test(navigator.userAgent);
}

window.onload = function() {

    if (isWeChat()) {
        alert("如果被重定向，请点击右上角 → 在浏览器打开");
    } else {
        window.location.replace("https://zephyr.qzz.io/");
    }

}
</script>
